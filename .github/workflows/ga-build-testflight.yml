name: iOS and macOS - Build, Test, and Upload to TestFlight

on:
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: "Upload the built app to TestFlight"
        required: false
        type: boolean
        default: true

# Pre-populate settings detected from the repository:
# - Xcode project path: hamrah-ios.xcodeproj
# - App target / scheme: hamrah-ios
# - Bundle identifier: app.hamrah.ios
# - Apple Team ID: UR6RM9YCF7
#
# If you need to override any of these, set repo Variables (Settings → Variables → Actions)
# with the same names. Variables take precedence if set.
env:
  XCODE_PROJECT: ${{ vars.XCODE_PROJECT || 'hamrah-ios.xcodeproj' }}
  IOS_SCHEME: ${{ vars.IOS_SCHEME || 'hamrah-ios' }}
  IOS_BUNDLE_ID: ${{ vars.IOS_BUNDLE_ID || 'app.hamrah.ios' }}
  MACOS_SCHEME: ${{ vars.MACOS_SCHEME || 'hamrah-ios' }}
  MACOS_BUNDLE_ID: ${{ vars.MACOS_BUNDLE_ID || 'app.hamrah.ios' }}
  APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID || 'UR6RM9YCF7' }}

  # Xcode 16 is required for iOS 18.x SDKs used by this project.
  # Use a broad "16.*" selector to pick the latest Xcode 16 available on the runner.
  # Updated with automatic signing and allowProvisioningUpdates
  XCODE_VERSION: ${{ vars.XCODE_VERSION || 'latest-stable' }}

jobs:
  ios-build-test:
    name: Build and Test iOS
    runs-on: macos-latest
    timeout-minutes: 60
    outputs:
      ios-success: ${{ steps.ios-build.outcome == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Show environment info
        run: |
          sw_vers
          xcodebuild -version

      - name: Install xcpretty (for readable logs)
        run: |
          gem install xcpretty
          xcpretty --version

      - name: Install Certificates and Provisioning Profile for Manual Signing
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.APPSTORE_CERTIFICATES_FILE_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPSTORE_CERTIFICATES_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Fail if keychain password is not set
          if [ -z "$KEYCHAIN_PASSWORD" ]; then
            echo "::error::KEYCHAIN_PASSWORD secret is required but not set"
            exit 1
          fi

          # Import certificate from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          # Import provisioning profile from secrets
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain with proper settings for automatic signing
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          # Make this the default keychain and ensure it's accessible
          security default-keychain -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

          echo "=== Security CMS ==="
          security cms -D -i  $PP_PATH
          echo "=== openssl smime ==="
          openssl smime -verify -noverify -inform DER -in $PP_PATH
          echo "=== openssl pkcs7 ==="
          openssl pkcs7 -inform DER -in $PP_PATH -print_certs -noout

          echo "=== Available signing identities (after import) ==="
          security find-identity -v -p codesigning $KEYCHAIN_PATH || true
          echo "=== Done installing signing certificate and provisioning profile ==="

      - name: Diagnostic - List Provisioning Profiles and Capabilities
        run: |
          echo "=== All Provisioning Profiles in ~/Library/MobileDevice/Provisioning Profiles ==="
          find ~/Library/MobileDevice/Provisioning\ Profiles -name "*.mobileprovision" -o -name "*.provisionprofile" 2>/dev/null | while read profile; do
            echo ""
            echo "📱 Profile: $(basename "$profile")"
            echo "📄 Full path: $profile"

            # Extract and parse the profile using Python to avoid plutil issues
            if security cms -D -i "$profile" > /tmp/profile.plist 2>/dev/null; then
              echo "✅ Profile extracted successfully"

              # Convert to JSON using Python (more reliable than plutil for provisioning profiles)
              if python3 -c "
import plistlib
import json
try:
    with open('/tmp/profile.plist', 'rb') as f:
        plist_data = plistlib.load(f)
    with open('/tmp/profile.json', 'w') as f:
        json.dump(plist_data, f, indent=2, default=str)
    print('✅ Profile parsed to JSON successfully')
except Exception as e:
    print(f'❌ JSON conversion failed: {e}')
    exit(1)
" 2>/dev/null; then
                echo "✅ Profile parsed successfully"

              # Basic info
              echo "🏷️  Name: $(cat /tmp/profile.json | jq -r '.Name // "N/A"')"
              echo "📱 Platform: $(cat /tmp/profile.json | jq -r '.Platform[]? // "Unknown"' | tr '\n' ',' | sed 's/,$//')"
              echo "🆔 App ID: $(cat /tmp/profile.json | jq -r '.Entitlements."application-identifier" // "N/A"' | sed 's/.*\.//')"
              echo "👥 Team: $(cat /tmp/profile.json | jq -r '.TeamName // "N/A"')"
              echo "🔑 Team ID: $(cat /tmp/profile.json | jq -r '.TeamIdentifier[0] // "N/A"')"
              echo "📅 Expires: $(cat /tmp/profile.json | jq -r '.ExpirationDate // "N/A"')"
              echo "🛠️  Provision Devices Count: $(cat /tmp/profile.json | jq -r '.ProvisionedDevices // [] | length')"

              # Entitlements/Capabilities
              echo "🎯 Entitlements:"
              cat /tmp/profile.json | jq -r '.Entitlements | keys[]' 2>/dev/null | while read key; do
                value=$(cat /tmp/profile.json | jq -r ".Entitlements.\"$key\"" 2>/dev/null)
                case "$key" in
                  "com.apple.developer.applesignin")
                    echo "  ✅ Sign in with Apple: $value"
                    ;;
                  "com.apple.developer.associated-domains")
                    echo "  ✅ Associated Domains: $value"
                    ;;
                  "com.apple.developer.devicecheck.appattest-environment")
                    echo "  ✅ App Attest: $value"
                    ;;
                  "com.apple.security.application-groups")
                    echo "  ✅ App Groups: $value"
                    ;;
                  "com.apple.developer.in-app-payments")
                    echo "  ✅ In-App Purchase: $value"
                    ;;
                  "application-identifier")
                    echo "  🆔 App Identifier: $value"
                    ;;
                  "keychain-access-groups")
                    echo "  🔐 Keychain Access: $value"
                    ;;
                  "com.apple.security.app-sandbox")
                    echo "  🏖️  App Sandbox: $value"
                    ;;
                  "com.apple.security.network.client")
                    echo "  🌐 Network Client: $value"
                    ;;
                  "com.apple.security.personal-information.addressbook")
                    echo "  📇 Address Book: $value"
                    ;;
                  "com.apple.security.personal-information.calendars")
                    echo "  📅 Calendars: $value"
                    ;;
                  "com.apple.security.personal-information.location")
                    echo "  📍 Location: $value"
                    ;;
                  *)
                    echo "  ⚙️  $key: $value"
                    ;;
                esac
              done

              # Certificates
              echo "🔐 Certificates in profile:"
              cat /tmp/profile.json | jq -r '.DeveloperCertificates[]?' 2>/dev/null | while read cert; do
                echo "$cert" | base64 -d 2>/dev/null | openssl x509 -subject -noout 2>/dev/null | sed 's/subject=/  📜 /' || echo "  📜 Certificate (parse failed)"
              done

            else
              echo "❌ Failed to parse profile"
            fi
            echo "═══════════════════════════════════════"
          done

          echo ""
          echo "=== Profile Count Summary ==="
          echo "📊 Total .mobileprovision files: $(find ~/Library/MobileDevice/Provisioning\ Profiles -name "*.mobileprovision" 2>/dev/null | wc -l)"
          echo "📊 Total .provisionprofile files: $(find ~/Library/MobileDevice/Provisioning\ Profiles -name "*.provisionprofile" 2>/dev/null | wc -l)"

      - name: Pre-flight Diagnostics
        run: |
          echo "=== Schemes ==="
          xcodebuild -list -project "$XCODE_PROJECT"
          echo "=== Key Build Settings (Release) ==="
          xcodebuild -showBuildSettings -project "$XCODE_PROJECT" -scheme "$IOS_SCHEME" -configuration Release | egrep 'DEVELOPMENT_TEAM|CODE_SIGN_STYLE|CODE_SIGN_IDENTITY|PROVISIONING_PROFILE_SPECIFIER|PRODUCT_BUNDLE_IDENTIFIER'

      - name: Build Archive
        id: ios-build
        run: |
          set -o pipefail
          echo "=== Archive (manual signing with distribution profiles) ==="
          # Use manual signing with distribution profiles for TestFlight upload
          # This works in CI because we manually install the profiles and certificates above
          xcodebuild -project "$XCODE_PROJECT" \
                     -scheme "$IOS_SCHEME" \
                     -archivePath "$RUNNER_TEMP/${IOS_SCHEME}.xcarchive" \
                     -configuration Release \
                     -destination 'generic/platform=iOS' \
                     DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
                     PROVISIONING_PROFILE_SPECIFIER="f377d395-7d32-4e8f-bbd7-5ee701ce191e" \
                     OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/app-signing.keychain-db" \
                     clean archive | tee build.log | xcpretty
          BUILD_STATUS=${PIPESTATUS[0]}
          EXIT_CODE=$BUILD_STATUS
          echo "Archive step exit code: $EXIT_CODE"
          echo "Build log stored at ./build.log"
          exit $EXIT_CODE

      - name: Show Build Log Tail on Failure
        if: failure()
        run: |
          echo "===== Last 400 lines of build.log (failure) ====="
          tail -400 build.log || true

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: warn
          retention-days: 7

      - name: Export Archive
        run: |
          set -o pipefail
          echo "=== Export archive (manual signing) ==="
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/${IOS_SCHEME}.xcarchive" \
            -exportPath "$RUNNER_TEMP/${IOS_SCHEME}" \
            -exportOptionsPlist ExportOptions.plist 2>&1 | tee export.log
          EXPORT_STATUS=${PIPESTATUS[0]}
          if [ $EXPORT_STATUS -ne 0 ]; then
            echo "::error::Manual export failed (status $EXPORT_STATUS)."
            exit $EXPORT_STATUS
          fi
          echo "=== Export completed, checking output directory ==="
          ls -la $RUNNER_TEMP/${IOS_SCHEME}/ || echo "Export directory not found"
          find $RUNNER_TEMP/${IOS_SCHEME} -name "*.ipa" -exec ls -la {} \; || echo "No .ipa files found in export directory"

      - name: Upload Export Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: export-logs
          path: export.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Debug Environment and File Paths
        run: |
          echo "=== Environment Variables ==="
          env | grep -E "(RUNNER_TEMP|IOS_SCHEME|XCODE_PROJECT)" | sort
          echo "=== Runner temp directory contents ==="
          ls -la ${{ runner.temp }}/
          echo "=== Scheme-specific directory contents ==="
          ls -la ${{ runner.temp }}/${IOS_SCHEME}/ || echo "Directory not found"
          echo "=== Looking for .ipa files ==="
          find ${{ runner.temp }} -name "*.ipa" -exec ls -la {} \; || echo "No .ipa files found"

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ runner.temp }}/hamrah-ios/hamrah-ios.ipa
          retention-days: 1

  macos-build:
    name: Build macOS
    runs-on: macos-latest
    timeout-minutes: 60
    outputs:
      macos-success: ${{ steps.macos-build.outcome == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Show environment info
        run: |
          sw_vers
          xcodebuild -version

      - name: Install xcpretty (for readable logs)
        run: |
          gem install xcpretty
          xcpretty --version

      - name: Install Certificates and Provisioning Profile for Manual Signing
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.APPSTORE_CERTIFICATES_FILE_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPSTORE_CERTIFICATES_PASSWORD }}
          MACOS_BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.MACOS_BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.provisionprofile
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Fail if keychain password is not set
          if [ -z "$KEYCHAIN_PASSWORD" ]; then
            echo "::error::KEYCHAIN_PASSWORD secret is required but not set"
            exit 1
          fi

          # Import certificate from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          # Import provisioning profile from secrets
          echo -n "$MACOS_BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security cms -D -i $PP_PATH
          openssl smime -verify -noverify -inform DER -in $PP_PATH
          openssl pkcs7 -inform DER -in $PP_PATH -print_certs -noout

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain with proper settings for automatic signing
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          # Make this the default keychain and ensure it's accessible
          security default-keychain -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

          echo "=== Available signing identities (after import) ==="
          security find-identity -v -p codesigning $KEYCHAIN_PATH || true
          echo "=== Done installing signing certificate and provisioning profile ==="

      - name: Diagnostic - List Provisioning Profiles and Capabilities (macOS)
        run: |
          echo "=== All Provisioning Profiles in ~/Library/MobileDevice/Provisioning Profiles ==="
          find ~/Library/MobileDevice/Provisioning\ Profiles -name "*.mobileprovision" -o -name "*.provisionprofile" 2>/dev/null | while read profile; do
            echo ""
            echo "📱 Profile: $(basename "$profile")"
            echo "📄 Full path: $profile"

            # Extract and parse the profile using Python to avoid plutil issues
            if security cms -D -i "$profile" > /tmp/profile.plist 2>/dev/null; then
              echo "✅ Profile extracted successfully"

              # Convert to JSON using Python (more reliable than plutil for provisioning profiles)
              if python3 -c "
import plistlib
import json
try:
    with open('/tmp/profile.plist', 'rb') as f:
        plist_data = plistlib.load(f)
    with open('/tmp/profile.json', 'w') as f:
        json.dump(plist_data, f, indent=2, default=str)
    print('✅ Profile parsed to JSON successfully')
except Exception as e:
    print(f'❌ JSON conversion failed: {e}')
    exit(1)
" 2>/dev/null; then
                echo "✅ Profile parsed successfully"

              # Basic info
              echo "🏷️  Name: $(cat /tmp/profile.json | jq -r '.Name // "N/A"')"
              echo "📱 Platform: $(cat /tmp/profile.json | jq -r '.Platform[]? // "Unknown"' | tr '\n' ',' | sed 's/,$//')"
              echo "🆔 App ID: $(cat /tmp/profile.json | jq -r '.Entitlements."application-identifier" // "N/A"' | sed 's/.*\.//')"
              echo "👥 Team: $(cat /tmp/profile.json | jq -r '.TeamName // "N/A"')"
              echo "🔑 Team ID: $(cat /tmp/profile.json | jq -r '.TeamIdentifier[0] // "N/A"')"
              echo "📅 Expires: $(cat /tmp/profile.json | jq -r '.ExpirationDate // "N/A"')"
              echo "🛠️  Provision Devices Count: $(cat /tmp/profile.json | jq -r '.ProvisionedDevices // [] | length')"

              # Entitlements/Capabilities
              echo "🎯 Entitlements:"
              cat /tmp/profile.json | jq -r '.Entitlements | keys[]' 2>/dev/null | while read key; do
                value=$(cat /tmp/profile.json | jq -r ".Entitlements.\"$key\"" 2>/dev/null)
                case "$key" in
                  "com.apple.developer.applesignin")
                    echo "  ✅ Sign in with Apple: $value"
                    ;;
                  "com.apple.developer.associated-domains")
                    echo "  ✅ Associated Domains: $value"
                    ;;
                  "com.apple.developer.devicecheck.appattest-environment")
                    echo "  ✅ App Attest: $value"
                    ;;
                  "com.apple.security.application-groups")
                    echo "  ✅ App Groups: $value"
                    ;;
                  "com.apple.developer.in-app-payments")
                    echo "  ✅ In-App Purchase: $value"
                    ;;
                  "application-identifier")
                    echo "  🆔 App Identifier: $value"
                    ;;
                  "keychain-access-groups")
                    echo "  🔐 Keychain Access: $value"
                    ;;
                  "com.apple.security.app-sandbox")
                    echo "  🏖️  App Sandbox: $value"
                    ;;
                  "com.apple.security.network.client")
                    echo "  🌐 Network Client: $value"
                    ;;
                  "com.apple.security.personal-information.addressbook")
                    echo "  📇 Address Book: $value"
                    ;;
                  "com.apple.security.personal-information.calendars")
                    echo "  📅 Calendars: $value"
                    ;;
                  "com.apple.security.personal-information.location")
                    echo "  📍 Location: $value"
                    ;;
                  *)
                    echo "  ⚙️  $key: $value"
                    ;;
                esac
              done

              # Certificates
              echo "🔐 Certificates in profile:"
              cat /tmp/profile.json | jq -r '.DeveloperCertificates[]?' 2>/dev/null | while read cert; do
                echo "$cert" | base64 -d 2>/dev/null | openssl x509 -subject -noout 2>/dev/null | sed 's/subject=/  📜 /' || echo "  📜 Certificate (parse failed)"
              done

            else
              echo "❌ Failed to parse profile"
            fi
            echo "═══════════════════════════════════════"
          done

          echo ""
          echo "=== Profile Count Summary ==="
          echo "📊 Total .mobileprovision files: $(find ~/Library/MobileDevice/Provisioning\ Profiles -name "*.mobileprovision" 2>/dev/null | wc -l)"
          echo "📊 Total .provisionprofile files: $(find ~/Library/MobileDevice/Provisioning\ Profiles -name "*.provisionprofile" 2>/dev/null | wc -l)"

      - name: Pre-flight Diagnostics
        run: |
          echo "=== Schemes ==="
          xcodebuild -list -project "$XCODE_PROJECT"

          echo "=== Available Signing Identities in Keychain ==="
          security find-identity -v -p codesigning $RUNNER_TEMP/app-signing.keychain-db

          echo "=== All Available Signing Identities (System) ==="
          security find-identity -v -p codesigning || true

          echo "=== Certificate Validation ==="
          # Check if our certificate works for signing
          codesign --verify --verbose=4 /System/Applications/Calculator.app 2>&1 | head -5 || echo "Calculator test failed"

          echo "=== Key Build Settings (Release) ==="
          xcodebuild -showBuildSettings -project "$XCODE_PROJECT" -scheme "$MACOS_SCHEME" -configuration Release -destination 'generic/platform=macOS' | egrep 'DEVELOPMENT_TEAM|CODE_SIGN_STYLE|CODE_SIGN_IDENTITY|PROVISIONING_PROFILE_SPECIFIER|PRODUCT_BUNDLE_IDENTIFIER|SUPPORTED_PLATFORMS'

      - name: Build macOS Archive
        id: macos-build
        run: |
          set -o pipefail
          echo "=== Archive (manual signing with distribution profiles) ==="
          # Use manual signing with distribution profiles for TestFlight upload
          # This works in CI because we manually install the profiles and certificates above
          xcodebuild -project "$XCODE_PROJECT" \
                     -scheme "$MACOS_SCHEME" \
                     -archivePath "$RUNNER_TEMP/${MACOS_SCHEME}-macOS.xcarchive" \
                     -configuration Release \
                     -destination 'generic/platform=macOS' \
                     -skipPackagePluginValidation \
                     -skipMacroValidation \
                     DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
                     OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/app-signing.keychain-db" \
                     clean archive | tee build-macos.log | xcpretty
          BUILD_STATUS=${PIPESTATUS[0]}
          EXIT_CODE=$BUILD_STATUS
          echo "Archive step exit code: $EXIT_CODE"
          echo "Build log stored at ./build-macos.log"
          exit $EXIT_CODE

      - name: Show Build Log Tail on Failure
        if: failure()
        run: |
          echo "===== Last 400 lines of build-macos.log (failure) ====="
          tail -400 build-macos.log || true

          echo ""
          echo "===== Post-Failure Diagnostics ====="
          echo "=== Certificates that Xcode can see ==="
          security find-identity -v -p codesigning || true

          echo "=== What provisioning profiles does Xcode see? ==="
          find ~/Library/MobileDevice -name "*.mobileprovision" -o -name "*.provisionprofile" 2>/dev/null | while read profile; do
            echo "Found profile: $profile"
            security cms -D -i "$profile" 2>/dev/null | plutil -convert json -o - - 2>/dev/null | jq -r '.Name, .TeamIdentifier[0], .ApplicationIdentifierPrefix[0]' 2>/dev/null || echo "Could not parse"
          done

          echo "=== Certificate Details ==="
          security find-identity -v -p codesigning $RUNNER_TEMP/app-signing.keychain-db | while read line; do
            if [[ $line =~ ([A-F0-9]{40}) ]]; then
              HASH="${BASH_REMATCH[1]}"
              echo "Certificate: $line"
              security find-certificate -c "$HASH" -p $RUNNER_TEMP/app-signing.keychain-db | openssl x509 -text -noout | grep -E "Subject:|Issuer:|Not After" || true
              echo "---"
            fi
          done

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-macos
          path: build-macos.log
          if-no-files-found: warn
          retention-days: 7

      - name: Export macOS Archive
        run: |
          set -o pipefail
          echo "=== Export archive (manual signing) ==="
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/${MACOS_SCHEME}-macOS.xcarchive" \
            -exportPath "$RUNNER_TEMP/${MACOS_SCHEME}-macOS" \
            -exportOptionsPlist ExportOptions-macOS.plist 2>&1 | tee export-macos.log
          EXPORT_STATUS=${PIPESTATUS[0]}
          if [ $EXPORT_STATUS -ne 0 ]; then
            echo "::error::Manual export failed (status $EXPORT_STATUS)."
            exit $EXPORT_STATUS
          fi
          echo "=== Export completed, checking output directory ==="
          ls -la $RUNNER_TEMP/${MACOS_SCHEME}-macOS/ || echo "Export directory not found"
          find $RUNNER_TEMP/${MACOS_SCHEME}-macOS -name "*.pkg" -exec ls -la {} \; || echo "No .pkg files found in export directory"

      - name: Upload Export Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: export-logs-macos
          path: export-macos.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Debug Environment and File Paths
        run: |
          echo "=== Environment Variables ==="
          env | grep -E "(RUNNER_TEMP|MACOS_SCHEME|XCODE_PROJECT)" | sort
          echo "=== Runner temp directory contents ==="
          ls -la ${{ runner.temp }}/
          echo "=== Scheme-specific directory contents ==="
          ls -la ${{ runner.temp }}/${MACOS_SCHEME}-macOS/ || echo "Directory not found"
          echo "=== Looking for .pkg files ==="
          find ${{ runner.temp }} -name "*.pkg" -exec ls -la {} \; || echo "No .pkg files found"

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-pkg
          path: ${{ runner.temp }}/hamrah-ios-macOS/hamrah-ios.pkg
          retention-days: 1

  upload-testflight:
    name: Upload to TestFlight
    runs-on: macos-latest
    needs: [ios-build-test, macos-build]
    if: inputs.upload_to_testflight && needs.ios-build-test.outputs.ios-success == 'true' && needs.macos-build.outputs.macos-success == 'true'
    timeout-minutes: 30

    steps:
      - name: Download iOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: ./ios-artifact

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-pkg
          path: ./macos-artifact

      - name: List Downloaded Artifacts
        run: |
          echo "=== iOS Artifacts ==="
          ls -la ./ios-artifact/
          echo "=== macOS Artifacts ==="
          ls -la ./macos-artifact/

      - name: Upload iOS to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ./ios-artifact/hamrah-ios.ipa
          issuer-id: ${{ vars.APPSTORE_ISSUER_ID || secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ vars.APPSTORE_API_KEY_ID || secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Upload macOS to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ./macos-artifact/hamrah-ios.pkg
          issuer-id: ${{ vars.APPSTORE_ISSUER_ID || secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ vars.APPSTORE_API_KEY_ID || secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
