name: iOS and macOS - Build, Test, and Upload to TestFlight

on:
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: "Upload the built app to TestFlight"
        required: false
        type: boolean
        default: true

# Pre-populate settings detected from the repository:
# - Xcode project path: hamrah-ios.xcodeproj
# - App target / scheme: hamrah-ios
# - Bundle identifier: app.hamrah.ios
# - Apple Team ID: UR6RM9YCF7
#
# If you need to override any of these, set repo Variables (Settings → Variables → Actions)
# with the same names. Variables take precedence if set.
env:
  XCODE_PROJECT: ${{ vars.XCODE_PROJECT || 'hamrah-ios.xcodeproj' }}
  IOS_SCHEME: ${{ vars.IOS_SCHEME || 'hamrah-ios' }}
  IOS_BUNDLE_ID: ${{ vars.IOS_BUNDLE_ID || 'app.hamrah.ios' }}
  MACOS_SCHEME: ${{ vars.MACOS_SCHEME || 'hamrah-ios' }}
  MACOS_BUNDLE_ID: ${{ vars.MACOS_BUNDLE_ID || 'app.hamrah.ios' }}
  APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID || 'UR6RM9YCF7' }}

  # Xcode 16 is required for iOS 18.x SDKs used by this project.
  # Use a broad "16.*" selector to pick the latest Xcode 16 available on the runner.
  XCODE_VERSION: ${{ vars.XCODE_VERSION || 'latest-stable' }}

jobs:
  ios-build-test:
    name: Build and Test iOS
    runs-on: macos-latest
    timeout-minutes: 60
    outputs:
      ios-success: ${{ steps.ios-build.outcome == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Show environment info
        run: |
          sw_vers
          xcodebuild -version

      - name: Install xcpretty (for readable logs)
        run: |
          gem install xcpretty
          xcpretty --version

      - name: Install Certificates and Provisioning Profiles
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.APPSTORE_CERTIFICATES_FILE_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPSTORE_CERTIFICATES_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
            PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Fail if keychain password is not set
          if [ -z "$KEYCHAIN_PASSWORD" ]; then
            echo "::error::KEYCHAIN_PASSWORD secret is required but not set"
            exit 1
          fi

          # Import certificate and provisioning profile from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

          echo "=== Available signing identities (after import) ==="
          security find-identity -v -p codesigning $KEYCHAIN_PATH || true
          echo "=== Provisioning Profiles ==="
          ls -l ~/Library/MobileDevice/Provisioning\ Profiles || true
          echo "=== Done installing signing assets ==="
      - name: Pre-flight Diagnostics
        run: |
          echo "=== Schemes ==="
          xcodebuild -list -project "$XCODE_PROJECT"
          echo "=== Key Build Settings (Release) ==="
          xcodebuild -showBuildSettings -project "$XCODE_PROJECT" -scheme "$IOS_SCHEME" -configuration Release | egrep 'DEVELOPMENT_TEAM|CODE_SIGN_STYLE|CODE_SIGN_IDENTITY|PROVISIONING_PROFILE_SPECIFIER|PRODUCT_BUNDLE_IDENTIFIER'

      - name: Build Archive
        id: ios-build
        run: |
          set -o pipefail
          echo "=== Extract provisioning profile metadata ==="
          PROFILE_PATH=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/build_pp.mobileprovision 2>/dev/null || true)
          if [ -f "$PROFILE_PATH" ]; then
            security cms -D -i "$PROFILE_PATH" > $RUNNER_TEMP/profile.plist
            PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' $RUNNER_TEMP/profile.plist || echo "")
            PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' $RUNNER_TEMP/profile.plist || echo "")
            echo "Detected provisioning profile: $PROFILE_NAME ($PROFILE_UUID)"
          else
            echo "Provisioning profile not found at expected path; proceeding may fail."
            PROFILE_NAME=""
          fi
          echo "=== Archive (manual Distribution signing) ==="
          xcodebuild -project "$XCODE_PROJECT" \
                     -scheme "$IOS_SCHEME" \
                     -archivePath "$RUNNER_TEMP/${IOS_SCHEME}.xcarchive" \
                     -configuration Release \
                     -destination 'generic/platform=iOS' \
                     DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
                     CODE_SIGN_STYLE=Manual \
                     CODE_SIGN_IDENTITY="Apple Distribution" \
                     OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/app-signing.keychain-db" \
                     clean archive | tee build.log | xcpretty
          BUILD_STATUS=${PIPESTATUS[0]}
          EXIT_CODE=$BUILD_STATUS
          echo "Archive step exit code: $EXIT_CODE"
          echo "Build log stored at ./build.log"
          exit $EXIT_CODE

      - name: Show Build Log Tail on Failure
        if: failure()
        run: |
          echo "===== Last 400 lines of build.log (failure) ====="
          tail -400 build.log || true

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: warn
          retention-days: 7

      - name: Export Archive
        run: |
          set -o pipefail
          echo "=== Export archive (manual signing) ==="
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/${IOS_SCHEME}.xcarchive" \
            -exportPath "$RUNNER_TEMP/${IOS_SCHEME}" \
            -exportOptionsPlist ExportOptions.plist 2>&1 | tee export.log
          EXPORT_STATUS=${PIPESTATUS[0]}
          if [ $EXPORT_STATUS -ne 0 ]; then
            echo "::error::Manual export failed (status $EXPORT_STATUS)."
            exit $EXPORT_STATUS
          fi
          echo "=== Export completed, checking output directory ==="
          ls -la $RUNNER_TEMP/${IOS_SCHEME}/ || echo "Export directory not found"
          find $RUNNER_TEMP/${IOS_SCHEME} -name "*.ipa" -exec ls -la {} \; || echo "No .ipa files found in export directory"

      - name: Upload Export Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: export-logs
          path: export.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Debug Environment and File Paths
        run: |
          echo "=== Environment Variables ==="
          env | grep -E "(RUNNER_TEMP|IOS_SCHEME|XCODE_PROJECT)" | sort
          echo "=== Runner temp directory contents ==="
          ls -la ${{ runner.temp }}/
          echo "=== Scheme-specific directory contents ==="
          ls -la ${{ runner.temp }}/${IOS_SCHEME}/ || echo "Directory not found"
          echo "=== Looking for .ipa files ==="
          find ${{ runner.temp }} -name "*.ipa" -exec ls -la {} \; || echo "No .ipa files found"

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ runner.temp }}/hamrah-ios/hamrah-ios.ipa
          retention-days: 1

  macos-build:
    name: Build macOS
    runs-on: macos-latest
    timeout-minutes: 60
    outputs:
      macos-success: ${{ steps.macos-build.outcome == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Show environment info
        run: |
          sw_vers
          xcodebuild -version

      - name: Install xcpretty (for readable logs)
        run: |
          gem install xcpretty
          xcpretty --version

      - name: Install Certificates and Provisioning Profiles
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.APPSTORE_CERTIFICATES_FILE_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPSTORE_CERTIFICATES_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Fail if keychain password is not set
          if [ -z "$KEYCHAIN_PASSWORD" ]; then
            echo "::error::KEYCHAIN_PASSWORD secret is required but not set"
            exit 1
          fi

          # Import certificate from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          echo "=== Available signing identities (after import) ==="
          security find-identity -v -p codesigning $KEYCHAIN_PATH || true
          echo "=== Done installing signing assets ==="

      - name: Pre-flight Diagnostics
        run: |
          echo "=== Schemes ==="
          xcodebuild -list -project "$XCODE_PROJECT"
          echo "=== Available Signing Identities ==="
          security find-identity -v -p codesigning $RUNNER_TEMP/app-signing.keychain-db
          echo "=== Key Build Settings (Release) ==="
          xcodebuild -showBuildSettings -project "$XCODE_PROJECT" -scheme "$MACOS_SCHEME" -configuration Release -destination 'generic/platform=macOS' | egrep 'DEVELOPMENT_TEAM|CODE_SIGN_STYLE|CODE_SIGN_IDENTITY|PROVISIONING_PROFILE_SPECIFIER|PRODUCT_BUNDLE_IDENTIFIER'

      - name: Build macOS Archive
        id: macos-build
        run: |
          set -o pipefail
          echo "=== Archive (automatic Distribution signing) ==="
          xcodebuild -project "$XCODE_PROJECT" \
                     -scheme "$MACOS_SCHEME" \
                     -archivePath "$RUNNER_TEMP/${MACOS_SCHEME}-macOS.xcarchive" \
                     -configuration Release \
                     -destination 'generic/platform=macOS' \
                     DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
                     CODE_SIGN_STYLE=Automatic \
                     OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/app-signing.keychain-db" \
                     clean archive | tee build-macos.log | xcpretty
          BUILD_STATUS=${PIPESTATUS[0]}
          EXIT_CODE=$BUILD_STATUS
          echo "Archive step exit code: $EXIT_CODE"
          echo "Build log stored at ./build-macos.log"
          exit $EXIT_CODE

      - name: Show Build Log Tail on Failure
        if: failure()
        run: |
          echo "===== Last 400 lines of build-macos.log (failure) ====="
          tail -400 build-macos.log || true

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-macos
          path: build-macos.log
          if-no-files-found: warn
          retention-days: 7

      - name: Export macOS Archive
        run: |
          set -o pipefail
          echo "=== Export archive (manual signing) ==="
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/${MACOS_SCHEME}-macOS.xcarchive" \
            -exportPath "$RUNNER_TEMP/${MACOS_SCHEME}-macOS" \
            -exportOptionsPlist ExportOptions-macOS.plist 2>&1 | tee export-macos.log
          EXPORT_STATUS=${PIPESTATUS[0]}
          if [ $EXPORT_STATUS -ne 0 ]; then
            echo "::error::Manual export failed (status $EXPORT_STATUS)."
            exit $EXPORT_STATUS
          fi
          echo "=== Export completed, checking output directory ==="
          ls -la $RUNNER_TEMP/${MACOS_SCHEME}-macOS/ || echo "Export directory not found"
          find $RUNNER_TEMP/${MACOS_SCHEME}-macOS -name "*.pkg" -exec ls -la {} \; || echo "No .pkg files found in export directory"

      - name: Upload Export Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: export-logs-macos
          path: export-macos.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Debug Environment and File Paths
        run: |
          echo "=== Environment Variables ==="
          env | grep -E "(RUNNER_TEMP|MACOS_SCHEME|XCODE_PROJECT)" | sort
          echo "=== Runner temp directory contents ==="
          ls -la ${{ runner.temp }}/
          echo "=== Scheme-specific directory contents ==="
          ls -la ${{ runner.temp }}/${MACOS_SCHEME}-macOS/ || echo "Directory not found"
          echo "=== Looking for .pkg files ==="
          find ${{ runner.temp }} -name "*.pkg" -exec ls -la {} \; || echo "No .pkg files found"

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-pkg
          path: ${{ runner.temp }}/hamrah-ios-macOS/hamrah-ios.pkg
          retention-days: 1

  upload-testflight:
    name: Upload to TestFlight
    runs-on: macos-latest
    needs: [ios-build-test, macos-build]
    if: inputs.upload_to_testflight && needs.ios-build-test.outputs.ios-success == 'true' && needs.macos-build.outputs.macos-success == 'true'
    timeout-minutes: 30

    steps:
      - name: Download iOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: ./ios-artifact

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-pkg
          path: ./macos-artifact

      - name: List Downloaded Artifacts
        run: |
          echo "=== iOS Artifacts ==="
          ls -la ./ios-artifact/
          echo "=== macOS Artifacts ==="
          ls -la ./macos-artifact/

      - name: Upload iOS to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ./ios-artifact/hamrah-ios.ipa
          issuer-id: ${{ vars.APPSTORE_ISSUER_ID || secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ vars.APPSTORE_API_KEY_ID || secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Upload macOS to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ./macos-artifact/hamrah-ios.pkg
          issuer-id: ${{ vars.APPSTORE_ISSUER_ID || secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ vars.APPSTORE_API_KEY_ID || secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
